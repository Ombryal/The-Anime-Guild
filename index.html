<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Orbit Widget</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="discord-widget-wrapper">
        <div id="orbit-container">
            
            <div id="widget-loader">
                <div class="spinner"></div>
                <p>Connecting to Discord...</p>
            </div>

            <div id="orbit-center" class="hidden">
                <div class="pulse-ring"></div>
                <img id="server-icon" src="" alt="Server Icon">
                <div class="server-info">
                    <span id="server-name">Loading...</span>
                    <span id="online-count">0 Online</span>
                </div>
            </div>

            <div id="member-orbit-ring" class="rotating-ring"></div>

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
