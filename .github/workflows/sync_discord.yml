name: Update Staff Database

on:
  schedule:
    - cron: '*/15 * * * *'   # Runs every 15 minutes
  workflow_dispatch:          # Allows manual trigger

jobs:
  fetch-discord-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Fetch Discord Data (Members + Roles)
        uses: actions/github-script@v6
        env:
          BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          GUILD_ID: '1433645535583277129'
        with:
          script: |
            const fs = require('fs');
            const guildId = process.env.GUILD_ID;
            const botToken = process.env.BOT_TOKEN;

            const staffIds = [
              "683212245311946795", "959431187955351623", "183900012705480705",
              "1398034278662537337", "652983918013841429", "531178595130015755",
              "1388087779174383719", "287809220210851851", "916731589893959710",
              "226914498089451520"
            ];

            // 1. Fetch all guild roles (for mapping)
            const rolesRes = await fetch(`https://discord.com/api/v10/guilds/${guildId}/roles`, {
              headers: { 'Authorization': `Bot ${botToken}` }
            });
            const roles = await rolesRes.json();
            // Build a map id -> { name, color }
            const roleMap = {};
            roles.forEach(role => {
              roleMap[role.id] = { name: role.name, color: role.color };
            });

            // 2. Fetch each staff member's guild member info (roles, nick)
            let staffData = {
              lastUpdated: new Date().toISOString(),
              roles: roleMap,          // include full role mapping
              members: []
            };

            for (const id of staffIds) {
              try {
                // Base user info
                const userRes = await fetch(`https://discord.com/api/v10/users/${id}`, {
                  headers: { 'Authorization': `Bot ${botToken}` }
                });
                const user = await userRes.json();
                if (!user.id) continue;

                // Guild member info
                const memberRes = await fetch(`https://discord.com/api/v10/guilds/${guildId}/members/${id}`, {
                  headers: { 'Authorization': `Bot ${botToken}` }
                });
                const member = memberRes.ok ? await memberRes.json() : {};

                const avatarUrl = user.avatar
                  ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=128`
                  : 'https://archive.org/download/discord_default_avatars/gray.png';

                staffData.members.push({
                  id: user.id,
                  name: user.username,
                  avatar: avatarUrl,
                  nickname: member.nick || null,
                  roles: member.roles || []      // array of role IDs
                });

                console.log(`Fetched ${user.username} (${id})`);
              } catch (error) {
                console.log(`FAILED_ID: ${id}`, error.message);
              }
            }

            fs.writeFileSync('staff_data.json', JSON.stringify(staffData, null, 2));

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Liquid-Glass-Bot"
          git config --global user.email "actions@github.com"
          git add staff_data.json
          git commit -m "DATA_SYNC: Update Staff Profiles + Roles" || exit 0
          git pull --rebase origin main
          git push
