name: Update Staff Database

on:
  schedule:
    - cron: '0 * * * *' # Runs once an hour automatically
  workflow_dispatch: # Allows you to click a "Run" button manually in GitHub

jobs:
  fetch-discord-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important: Allows the bot to push code to your repo
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Fetch Profiles and Create JSON
        uses: actions/github-script@v6
        env:
          BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            // Your exact staff IDs
            const staffIds = [
              "683212245311946795", "959431187955351623", "183900012705480705", 
              "1398034278662537337", "1388087779174383719", "287809220210851851", 
              "368838581009252362", "916731589893959710", "226914498089451520", 
              "531178595130015755", "652983918013841429", "556714289453465601"
            ];
            
            let staffData = [];
            
            for (const id of staffIds) {
              try {
                const response = await fetch(`https://discord.com/api/v10/users/${id}`, {
                  headers: { 'Authorization': `Bot ${process.env.BOT_TOKEN}` }
                });
                const user = await response.json();
                
                if (user.id) {
                  const avatarUrl = user.avatar 
                    ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=128` 
                    : 'https://archive.org/download/discord_default_avatars/gray.png';
                    
                  staffData.push({ id: user.id, name: user.username, avatar: avatarUrl });
                }
              } catch (error) {
                console.log(`Failed to fetch ${id}`, error);
              }
            }
            
            fs.writeFileSync('staff_data.json', JSON.stringify(staffData, null, 2));

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add staff_data.json
          git commit -m "Automated staff data sync" || echo "No changes to commit"
          git push
